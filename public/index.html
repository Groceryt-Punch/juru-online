<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>초대형 온라인 주루마블</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <script src="/socket.io/socket.io.js"></script>
</head>
<body>
    <div id="lobby" class="pink-box large">
        <h2 class="logo">🍻 초대형 커스텀 주루마블</h2>
        <div id="setup-form">
            <input type="text" id="nick-input" placeholder="닉네임 입력 (최대 5자)" maxlength="5">
            <input type="text" id="img-input" placeholder="이미지 주소(URL) 입력 (선택)">
            <button onclick="join()">게임 입장하기</button>
        </div>
    </div>

    <div id="game-screen" style="display:none;">
        <div id="board">
            <div id="pieces-layer"></div>
        </div>
        <div id="ui-panel" class="pink-box">
            <div id="turn-info">대기 중...</div>
            <button id="roll-btn" onclick="roll()" disabled>🎲 주사위 던지기</button>
            <div id="status-msg">친구들을 기다리고 있어요!</div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
